name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Lint
        run: npm run lint

      - name: Typecheck frontend
        run: npx tsc -b --noEmit

      - name: Typecheck server
        run: npx tsc --noEmit
        working-directory: server

      - name: Test frontend
        run: npm test -- --run

      - name: Build frontend
        run: npx vite build

      - name: Build server
        run: npm run build
        working-directory: server
